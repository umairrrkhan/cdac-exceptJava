<body>
    <script>
    function checkNumber(a , b){
        if(a== 50 || b == 50 || (a+b) == 50){
            return true;
        }
        else{
            return false;
        }
    }

    let num1 = Number(prompt("enter first number : "));
    let num2 = Number(prompt("enter the second number :"));

    let result = checkNumber(num1 , num2)
    alert(result);
    </script>
